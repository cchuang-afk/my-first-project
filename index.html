<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115年度學校護理人員暑假繼續教育研習課程報名系統</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col justify-between">

    <main class="flex-grow flex items-center justify-center px-4 py-12 sm:px-6 lg:px-8">
        <!-- 主卡片容器 -->
        <div class="max-w-2xl w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-teal-100">
            
            <!-- 橫幅宣傳區 -->
            <div class="relative bg-gradient-to-r from-teal-500 to-cyan-600 p-8 sm:p-10 text-white text-center">
                <div class="relative z-10">
                    <div class="inline-flex items-center px-3 py-1 rounded-full text-xs font-semibold bg-white/20 text-white backdrop-blur-sm mb-4">
                        <i data-lucide="calendar" class="w-3.5 h-3.5 mr-1.5"></i>
                        115年度暑假研習課程
                    </div>
                    <h2 class="text-2xl sm:text-3xl font-extrabold tracking-tight mb-2">
                        學校護理人員暑假繼續教育研習課程
                    </h2>
                    <p class="text-teal-50 text-sm sm:text-base">
                        專業成長 · 衛教精進 · 校園健康守護
                    </p>
                </div>
            </div>

            <!-- 核心狀態與報名時間資訊區 -->
            <div class="p-8 sm:p-10 bg-amber-50/60 border-b border-amber-100">
                <div class="flex flex-col items-center text-center">
                    
                    <!-- 狀態標籤 -->
                    <div class="flex flex-wrap justify-center gap-2 mb-6">
                        <span class="px-3.5 py-1.5 rounded-full text-xs sm:text-sm font-bold bg-amber-100 text-amber-800 border border-amber-200">
                            尚未開放報名
                        </span>
                        <span class="px-3.5 py-1.5 rounded-full text-xs sm:text-sm font-bold bg-rose-100 text-rose-800 border border-rose-200">
                            限額 300 人 (滿額關閉系統)
                        </span>
                    </div>

                    <!-- 放大後的報名時間說明 -->
                    <h3 class="text-xl sm:text-2xl font-black text-slate-850 mb-4 tracking-wide">
                        報名時間資訊：
                    </h3>
                    <div class="text-slate-700 space-y-3">
                        <p class="text-base sm:text-xl leading-relaxed">
                            開放時間：<span class="font-bold text-teal-600 bg-teal-50 px-2 py-0.5 rounded">115年 6 月 8 日 上午 08:00</span>
                        </p>
                        <p class="text-base sm:text-xl leading-relaxed">
                            截止時間：<span class="font-bold text-rose-600 bg-rose-50 px-2 py-0.5 rounded">115年 6 月 12 日 16:00</span>
                        </p>
                    </div>
                </div>
            </div>

            <!-- 倒數計時器 -->
            <div class="p-8 sm:p-10 text-center bg-white">
                <p class="text-slate-500 text-xs sm:text-sm font-semibold uppercase tracking-wider mb-5">
                    距離開放報名還有
                </p>
                <div class="grid grid-cols-4 gap-3 sm:gap-6 max-w-md mx-auto">
                    <!-- 天 -->
                    <div class="bg-slate-50 rounded-2xl p-3 sm:p-4 border border-slate-100 shadow-sm">
                        <span id="days" class="block text-2xl sm:text-4xl font-black text-teal-600">00</span>
                        <span class="text-xs text-slate-400 mt-1 block">天</span>
                    </div>
                    <!-- 時 -->
                    <div class="bg-slate-50 rounded-2xl p-3 sm:p-4 border border-slate-100 shadow-sm">
                        <span id="hours" class="block text-2xl sm:text-4xl font-black text-teal-600">00</span>
                        <span class="text-xs text-slate-400 mt-1 block">時</span>
                    </div>
                    <!-- 分 -->
                    <div class="bg-slate-50 rounded-2xl p-3 sm:p-4 border border-slate-100 shadow-sm">
                        <span id="minutes" class="block text-2xl sm:text-4xl font-black text-teal-600">00</span>
                        <span class="text-xs text-slate-400 mt-1 block">分</span>
                    </div>
                    <!-- 秒 -->
                    <div class="bg-slate-50 rounded-2xl p-3 sm:p-4 border border-slate-100 shadow-sm">
                        <span id="seconds" class="block text-2xl sm:text-4xl font-black text-rose-500 animate-pulse">00</span>
                        <span class="text-xs text-slate-400 mt-1 block">秒</span>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- 頁尾 -->
    <footer class="bg-slate-900 text-slate-400 py-6 text-center text-xs border-t border-slate-800">
        <p>©  · 報名管理系統</p>
    </footer>

    <script>
        // 初始化 Lucide 圖標
        lucide.createIcons();

        // 開放報名目標時間（115年，即2026年 6月8日上午8:00:00）
        const TARGET_DATE = new Date("2026-06-08T08:00:00").getTime();

        // 倒數計時器邏輯
        function updateCountdown() {
            const now = new Date().getTime();
            const distance = TARGET_DATE - now;

            if (distance < 0) {
                // 若已經到了 6/8 08:00 以後
                document.getElementById("days").innerText = "00";
                document.getElementById("hours").innerText = "00";
                document.getElementById("minutes").innerText = "00";
                document.getElementById("seconds").innerText = "00";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = String(days).padStart(2, '0');
            document.getElementById("hours").innerText = String(hours).padStart(2, '0');
            document.getElementById("minutes").innerText = String(minutes).padStart(2, '0');
            document.getElementById("seconds").innerText = String(seconds).padStart(2, '0');
        }

        // 啟動倒數計時，每秒更新一次
        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
