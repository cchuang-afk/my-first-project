<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國立旗山高級農工職業學校 - 臨時辦公入口</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0f4f8;
        }

        .school-gradient {
            background: linear-gradient(135deg, #2d5a27 0%, #4a7c44 100%);
        }

        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header -->
    <header class="school-gradient text-white py-8 shadow-lg">
        <div class="container mx-auto px-4 text-center">
            <h1 class="text-3xl md:text-4xl font-bold mb-2">國立旗山高級農工職業學校</h1>
            <p class="text-lg opacity-90">教職員工常用系統入口 (臨時網頁)</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 py-12">
        <div class="max-w-4xl mx-auto">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                
                <!-- 校務基金 -->
                <a href="http://163.16.223.12/" target="_blank" class="card-hover bg-white rounded-xl p-6 flex items-center space-x-4 border border-gray-100 shadow-sm group">
                    <div class="bg-green-100 p-4 rounded-full text-green-700 group-hover:bg-green-600 group-hover:text-white transition-colors">
                        <i data-lucide="calculator" class="w-8 h-8"></i>
                    </div>
                    <div>
                        <h2 class="text-xl font-bold text-gray-800">校務基金連結</h2>
                        <p class="text-gray-500 text-sm">預算、會計與經費查詢</p>
                    </div>
                </a>

                <!-- 公文系統 -->
                <a href="https://www.cloudop.tw/CLOUDWEBAP/" target="_blank" class="card-hover bg-white rounded-xl p-6 flex items-center space-x-4 border border-gray-100 shadow-sm group">
                    <div class="bg-blue-100 p-4 rounded-full text-blue-700 group-hover:bg-blue-600 group-hover:text-white transition-colors">
                        <i data-lucide="file-text" class="w-8 h-8"></i>
                    </div>
                    <div>
                        <h2 class="text-xl font-bold text-gray-800">公文系統</h2>
                        <p class="text-gray-500 text-sm">電子公文陳核與管理</p>
                    </div>
                </a>

                <!-- 差勤系統 -->
                <a href="https://pk12.cloudhr.tw/" target="_blank" class="card-hover bg-white rounded-xl p-6 flex items-center space-x-4 border border-gray-100 shadow-sm group">
                    <div class="bg-orange-100 p-4 rounded-full text-orange-700 group-hover:bg-orange-600 group-hover:text-white transition-colors">
                        <i data-lucide="clock" class="w-8 h-8"></i>
                    </div>
                    <div>
                        <h2 class="text-xl font-bold text-gray-800">差勤系統</h2>
                        <p class="text-gray-500 text-sm">請假、加班與考勤管理</p>
                    </div>
                </a>

                <!-- 成績系統 -->
                <a href="https://auth.ischool.com.tw/oauth/authorize.php?client_id=7fdeb5496d2b40afaf24b9bca43ecb38&scope=User.Mail,User.BasicInfo,User.Application,User.Detail,Edit.User.BasicInfo,*:1campus.mobile.v2.guest,*:1campus.mobile.v2.student,*:1campus.mobile.v2.parent,*:1campus.mobile.v2.teacher,*:1campus.mobile.v2.admin,*:web3.v1.guest,*:web3.v1.teacher,*:web3.v1.student,*:web3.v1.admin&state=%7B%22next%22%3A%22%2Fs%3Fschool%3Dcsvs.khc.edu.tw%22%7D&redirect_uri=https%3A%2F%2F1campus.net%2Fauth%2Fcallback%2Fischool&response_type=code#/tologin" target="_blank" class="card-hover bg-white rounded-xl p-6 flex items-center space-x-4 border border-gray-100 shadow-sm group">
                    <div class="bg-purple-100 p-4 rounded-full text-purple-700 group-hover:bg-purple-600 group-hover:text-white transition-colors">
                        <i data-lucide="graduation-cap" class="w-8 h-8"></i>
                    </div>
                    <div>
                        <h2 class="text-xl font-bold text-gray-800">成績系統 (ischool)</h2>
                        <p class="text-gray-500 text-sm">學生成績錄入與查詢</p>
                    </div>
                </a>

                <!-- 財管系統 -->
                <a href="http://163.16.223.22/dj/" target="_blank" class="card-hover bg-white rounded-xl p-6 flex items-center space-x-4 border border-gray-100 shadow-sm group">
                    <div class="bg-red-100 p-4 rounded-full text-red-700 group-hover:bg-red-600 group-hover:text-white transition-colors">
                        <i data-lucide="database" class="w-8 h-8"></i>
                    </div>
                    <div>
                        <h2 class="text-xl font-bold text-gray-800">財管系統</h2>
                        <p class="text-gray-500 text-sm">校產與物資管理系統</p>
                    </div>
                </a>

                <!-- 網路硬碟 -->
                <a href="http://163.16.223.13:12000/index.cgi#/signin" target="_blank" class="card-hover bg-white rounded-xl p-6 flex items-center space-x-4 border border-gray-100 shadow-sm group">
                    <div class="bg-cyan-100 p-4 rounded-full text-cyan-700 group-hover:bg-cyan-600 group-hover:text-white transition-colors">
                        <i data-lucide="hard-drive" class="w-8 h-8"></i>
                    </div>
                    <div>
                        <h2 class="text-xl font-bold text-gray-800">網路硬碟</h2>
                        <p class="text-gray-500 text-sm">校內資料儲存與分享平台</p>
                    </div>
                </a>

            </div>

            <!-- Notice Box -->
            <div class="mt-12 bg-white border-l-4 border-yellow-500 p-6 rounded-r-lg shadow-sm">
                <div class="flex items-start">
                    <div class="flex-shrink-0">
                        <i data-lucide="alert-circle" class="w-6 h-6 text-yellow-500"></i>
                    </div>
                    <div class="ml-3">
                        <h3 class="text-sm font-bold text-gray-800 uppercase tracking-wide">注意事項</h3>
                        <p class="mt-2 text-sm text-gray-600 leading-6">
                            本頁面為旗山農工內部常用系統之臨時入口導航。請使用 Chrome 或 Edge 瀏覽器以獲得最佳操作體驗。
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-gray-400 py-6 text-center text-sm">
        <p>© 國立旗山高級農工職業學校 | 系統快捷入口</p>
        <p class="mt-1">校址：842高雄市旗山區旗甲路一段195號</p>
    </footer>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
